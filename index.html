<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>三角関数の値クイズ</title>

  <style>
    :root{
      --fg:#111;
      --muted:#666;
      --ok:#147a2e;
      --bad:#c51f1a;
      --bg:#f6f7fb;
      --card:#fff;
      --line:#d9d9d9;
      --accent:#2b6de8;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    .wrap{
      max-width:900px;
      margin:10px auto;
      padding:10px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    h1{
      font-size:20px;
      margin:0;
    }

    .badge{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fafafa;
      font-size:13px;
      font-weight:1000;
    }

    .quizCard{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
    }

    .cardTitle{
      font-size:13px;
      color:var(--muted);
      font-weight:1000;
      margin-bottom:8px;
    }

    .notice{
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
      margin-bottom:12px;
    }

    .modeRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .modeBtn{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:1000;
      font-size:13px;
    }

    .modeBtn.active{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .questionBox{
      border:2px solid #c9d4ff;
      background:#f3f5ff;
      border-radius:18px;
      padding:24px 12px;
      text-align:center;
      margin-bottom:12px;
    }

    .questionLabel{
      font-size:13px;
      color:var(--muted);
      font-weight:1000;
      margin-bottom:8px;
    }

    .question{
      font-size:42px;
      font-weight:1000;
      line-height:1.25;
      min-height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .question mjx-container{
      font-size:125% !important;
    }

    .choiceArea{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:8px;
    }

    @media (max-width:600px){
      .choiceArea{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    .choiceBtn{
      padding:12px 8px;
      border-radius:14px;
      border:2px solid #ddd;
      background:#fff;
      cursor:pointer;
      font-weight:1000;
      font-size:18px;
      min-height:64px;
    }

    .choiceBtn:hover{
      border-color:var(--accent);
      background:#f8faff;
    }

    .choiceBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .choiceBtn.ok{
      border-color:rgba(20,122,46,.6);
      background:rgba(20,122,46,.08);
      color:var(--ok);
    }

    .choiceBtn.bad{
      border-color:rgba(197,31,26,.6);
      background:rgba(197,31,26,.08);
      color:var(--bad);
    }

    .choiceBtn mjx-container{
      font-size:115% !important;
    }

    .judge{
      margin-top:12px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fafafa;
      font-size:14px;
      font-weight:1000;
      color:var(--muted);
      min-height:22px;
    }

    .judge.ok{
      border-color:rgba(20,122,46,.35);
      background:rgba(20,122,46,.08);
      color:var(--ok);
    }

    .judge.bad{
      border-color:rgba(197,31,26,.35);
      background:rgba(197,31,26,.08);
      color:var(--bad);
    }

    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:1000;
    }

    button.primary{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    button.hint{
      background:#fff8e8;
      border-color:#f0c36a;
    }

    button.hint2{
      background:#fff0f0;
      border-color:#f3a1a1;
    }

    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    /* ===== ヒント全画面 ===== */

    .hintOverlay{
      position:fixed;
      inset:0;
      z-index:10000;
      display:none;
      background:rgba(0,0,0,.88);
      padding:18px;
      box-sizing:border-box;
    }

    .hintOverlay.show{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hintInner{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hintInner img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      background:#fff;
      border-radius:12px;
      box-shadow:0 18px 60px rgba(0,0,0,.45);
    }

    .hintClose{
      position:absolute;
      top:10px;
      right:10px;
      width:50px;
      height:50px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.8);
      background:rgba(0,0,0,.55);
      color:#fff;
      font-size:30px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:2;
    }

    .hintClose:hover{
      background:rgba(255,255,255,.2);
    }

    .hintLabel{
      position:absolute;
      left:14px;
      top:14px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.9);
      color:#111;
      font-weight:1000;
      font-size:14px;
      z-index:2;
    }

    /* ===== 正解演出 ===== */

    .winOverlay{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      z-index:9999;
      pointer-events:none;
      background:rgba(0,0,0,.18);
      backdrop-filter:blur(2px);
    }

    .winOverlay.show{
      display:grid;
    }

    .winInner{
      position:relative;
      width:min(720px,92vw);
      border-radius:22px;
      padding:26px 22px 18px;
      background:rgba(255,255,255,.92);
      border:2px solid rgba(0,0,0,.15);
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      text-align:center;
      animation:winPop 1100ms ease-out forwards;
      overflow:hidden;
      isolation:isolate;
    }

    .winText{
      position:relative;
      z-index:2;
      font-weight:1000;
      font-size:clamp(34px,6vw,62px);
      letter-spacing:.03em;
      text-shadow:0 2px 0 rgba(0,0,0,.08);
      animation:winGlow 600ms ease-in-out infinite alternate;
    }

    .winSub{
      position:relative;
      z-index:2;
      margin-top:6px;
      font-weight:900;
      color:rgba(0,0,0,.55);
      font-size:14px;
    }

    .winBurst{
      position:absolute;
      inset:-26px;
      border-radius:26px;
      background:
        radial-gradient(circle at 50% 50%, rgba(43,109,232,.28) 0%, rgba(43,109,232,0) 55%),
        conic-gradient(from 0deg,
          rgba(255,255,255,0) 0 10%,
          rgba(43,109,232,.25) 10% 15%,
          rgba(255,255,255,0) 15% 25%,
          rgba(43,109,232,.22) 25% 30%,
          rgba(255,255,255,0) 30% 40%,
          rgba(43,109,232,.18) 40% 45%,
          rgba(255,255,255,0) 45% 100%);
      filter:blur(1px);
      opacity:.9;
      animation:burstSpin 700ms linear infinite;
      z-index:1;
    }

    @keyframes burstSpin{
      to{ transform:rotate(360deg); }
    }

    @keyframes winPop{
      0%{ transform:scale(.85); opacity:0; }
      18%{ transform:scale(1.06); opacity:1; }
      36%{ transform:scale(.98); }
      55%{ transform:scale(1); }
      100%{ transform:scale(1); opacity:0; }
    }

    @keyframes winGlow{
      from{ filter:drop-shadow(0 0 0 rgba(43,109,232,0)); }
      to{ filter:drop-shadow(0 0 14px rgba(43,109,232,.55)); }
    }

    .winInner.big{
      animation:winPopBig 2200ms ease-out forwards;
      border:2px solid rgba(255,255,255,.45);
      box-shadow:0 24px 80px rgba(0,0,0,.30), 0 0 40px rgba(255,255,255,.25);
    }

    .winInner.big::before{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:28px;
      background:conic-gradient(from 0deg,#ff2d2d,#ff8a00,#ffe600,#3cff00,#00ffd5,#0088ff,#7a00ff,#ff00c8,#ff2d2d);
      filter:blur(14px);
      opacity:.85;
      animation:rainbowSpin 480ms linear infinite;
      z-index:0;
      mix-blend-mode:screen;
    }

    .winInner.big .winText{
      background:linear-gradient(90deg,#ff2d2d,#ff8a00,#ffe600,#3cff00,#00ffd5,#0088ff,#7a00ff,#ff00c8,#ff2d2d);
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:none;
      animation:rainbowText 450ms linear infinite;
      filter:drop-shadow(0 0 10px rgba(255,255,255,.55))
             drop-shadow(0 0 18px rgba(0,255,255,.35))
             drop-shadow(0 0 22px rgba(255,0,200,.25));
    }

    .winInner.big .winBurst{
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 55%),
        conic-gradient(from 0deg,rgba(255,45,45,.35),rgba(255,138,0,.30),rgba(255,230,0,.30),rgba(60,255,0,.30),rgba(0,255,213,.30),rgba(0,136,255,.30),rgba(122,0,255,.30),rgba(255,0,200,.30),rgba(255,45,45,.35));
      opacity:1;
      animation:burstSpin 260ms linear infinite;
      filter:blur(.6px);
    }

    @keyframes winPopBig{
      0%{ transform:scale(.72); opacity:0; }
      10%{ transform:scale(1.16); opacity:1; }
      22%{ transform:scale(1.02); }
      40%{ transform:scale(1.10); }
      60%{ transform:scale(1); }
      78%{ transform:scale(1.06); }
      100%{ transform:scale(1); opacity:0; }
    }

    @keyframes rainbowSpin{
      to{ transform:rotate(360deg); }
    }

    @keyframes rainbowText{
      0%{ background-position:0% 50%; }
      100%{ background-position:100% 50%; }
    }
  </style>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>
  <div class="wrap">
    <div class="panel">
      <div class="topbar">
        <h1>三角関数の値クイズ</h1>
        <div class="badge">正解数：<span id="score">0</span></div>
      </div>

      <div class="quizCard">
        <div class="notice">
          角はすべてラジアンです。ヒント1は空欄つきの図、ヒント2は完成版の図です。
        </div>

        <div class="cardTitle">モード</div>
        <div class="modeRow">
          <button class="modeBtn active" id="modeAll">sin・cos・tan</button>
          <button class="modeBtn" id="modeSinCos">sin・cosのみ</button>
          <button class="modeBtn" id="modeTan">tanのみ</button>
        </div>

        <div class="questionBox">
          <div class="questionLabel">次の値を求めよ</div>
          <div class="question" id="question">読み込み中</div>
        </div>

        <div class="choiceArea" id="choiceArea"></div>

        <div class="judge" id="judge">答えを選んでください。</div>

        <div class="actions">
          <button class="primary" id="nextBtn" disabled>次の問題</button>
          <button class="hint" id="hint1Btn">ヒント1</button>
          <button class="hint2" id="hint2Btn">ヒント2</button>
          <button id="resetBtn">正解数リセット</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ヒント全画面 -->
  <div class="hintOverlay" id="hintOverlay" aria-hidden="true">
    <div class="hintInner">
      <div class="hintLabel" id="hintLabel">ヒント</div>
      <button class="hintClose" id="hintCloseBtn">×</button>
      <img id="hintImage" src="hint1-circle.png" alt="ヒント画像">
    </div>
  </div>

  <!-- 正解演出 -->
  <div id="winOverlay" class="winOverlay" aria-hidden="true">
    <div class="winInner" id="winInner">
      <div class="winBurst"></div>
      <div class="winText"><span id="winCount">0</span>問正解！</div>
      <div class="winSub">やったね！</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const questions = [
      { f:"sin", ans:"0", tex:"\\sin 0" },
      { f:"cos", ans:"1", tex:"\\cos 0" },
      { f:"tan", ans:"0", tex:"\\tan 0" },

      { f:"sin", ans:"1/2", tex:"\\sin \\frac{\\pi}{6}" },
      { f:"cos", ans:"√3/2", tex:"\\cos \\frac{\\pi}{6}" },
      { f:"tan", ans:"1/√3", tex:"\\tan \\frac{\\pi}{6}" },

      { f:"sin", ans:"√2/2", tex:"\\sin \\frac{\\pi}{4}" },
      { f:"cos", ans:"√2/2", tex:"\\cos \\frac{\\pi}{4}" },
      { f:"tan", ans:"1", tex:"\\tan \\frac{\\pi}{4}" },

      { f:"sin", ans:"√3/2", tex:"\\sin \\frac{\\pi}{3}" },
      { f:"cos", ans:"1/2", tex:"\\cos \\frac{\\pi}{3}" },
      { f:"tan", ans:"√3", tex:"\\tan \\frac{\\pi}{3}" },

      { f:"sin", ans:"1", tex:"\\sin \\frac{\\pi}{2}" },
      { f:"cos", ans:"0", tex:"\\cos \\frac{\\pi}{2}" },
      { f:"tan", ans:"定義されない", tex:"\\tan \\frac{\\pi}{2}" },

      { f:"sin", ans:"√3/2", tex:"\\sin \\frac{2\\pi}{3}" },
      { f:"cos", ans:"-1/2", tex:"\\cos \\frac{2\\pi}{3}" },
      { f:"tan", ans:"-√3", tex:"\\tan \\frac{2\\pi}{3}" },

      { f:"sin", ans:"√2/2", tex:"\\sin \\frac{3\\pi}{4}" },
      { f:"cos", ans:"-√2/2", tex:"\\cos \\frac{3\\pi}{4}" },
      { f:"tan", ans:"-1", tex:"\\tan \\frac{3\\pi}{4}" },

      { f:"sin", ans:"1/2", tex:"\\sin \\frac{5\\pi}{6}" },
      { f:"cos", ans:"-√3/2", tex:"\\cos \\frac{5\\pi}{6}" },
      { f:"tan", ans:"-1/√3", tex:"\\tan \\frac{5\\pi}{6}" },

      { f:"sin", ans:"0", tex:"\\sin \\pi" },
      { f:"cos", ans:"-1", tex:"\\cos \\pi" },
      { f:"tan", ans:"0", tex:"\\tan \\pi" },

      { f:"sin", ans:"-1/2", tex:"\\sin \\frac{7\\pi}{6}" },
      { f:"cos", ans:"-√3/2", tex:"\\cos \\frac{7\\pi}{6}" },
      { f:"tan", ans:"1/√3", tex:"\\tan \\frac{7\\pi}{6}" },

      { f:"sin", ans:"-√2/2", tex:"\\sin \\frac{5\\pi}{4}" },
      { f:"cos", ans:"-√2/2", tex:"\\cos \\frac{5\\pi}{4}" },
      { f:"tan", ans:"1", tex:"\\tan \\frac{5\\pi}{4}" },

      { f:"sin", ans:"-√3/2", tex:"\\sin \\frac{4\\pi}{3}" },
      { f:"cos", ans:"-1/2", tex:"\\cos \\frac{4\\pi}{3}" },
      { f:"tan", ans:"√3", tex:"\\tan \\frac{4\\pi}{3}" },

      { f:"sin", ans:"-1", tex:"\\sin \\frac{3\\pi}{2}" },
      { f:"cos", ans:"0", tex:"\\cos \\frac{3\\pi}{2}" },
      { f:"tan", ans:"定義されない", tex:"\\tan \\frac{3\\pi}{2}" },

      { f:"sin", ans:"-√3/2", tex:"\\sin \\frac{5\\pi}{3}" },
      { f:"cos", ans:"1/2", tex:"\\cos \\frac{5\\pi}{3}" },
      { f:"tan", ans:"-√3", tex:"\\tan \\frac{5\\pi}{3}" },

      { f:"sin", ans:"-√2/2", tex:"\\sin \\frac{7\\pi}{4}" },
      { f:"cos", ans:"√2/2", tex:"\\cos \\frac{7\\pi}{4}" },
      { f:"tan", ans:"-1", tex:"\\tan \\frac{7\\pi}{4}" },

      { f:"sin", ans:"-1/2", tex:"\\sin \\frac{11\\pi}{6}" },
      { f:"cos", ans:"√3/2", tex:"\\cos \\frac{11\\pi}{6}" },
      { f:"tan", ans:"-1/√3", tex:"\\tan \\frac{11\\pi}{6}" }
    ];

    const choices = [
      { value:"0", html:`\\(0\\)` },
      { value:"1/2", html:`\\(\\frac{1}{2}\\)` },
      { value:"√2/2", html:`\\(\\frac{\\sqrt{2}}{2}\\)` },
      { value:"√3/2", html:`\\(\\frac{\\sqrt{3}}{2}\\)` },
      { value:"1", html:`\\(1\\)` },

      { value:"-1/2", html:`\\(-\\frac{1}{2}\\)` },
      { value:"-√2/2", html:`\\(-\\frac{\\sqrt{2}}{2}\\)` },
      { value:"-√3/2", html:`\\(-\\frac{\\sqrt{3}}{2}\\)` },
      { value:"-1", html:`\\(-1\\)` },

      { value:"1/√3", html:`\\(\\frac{1}{\\sqrt{3}}\\)` },
      { value:"√3", html:`\\(\\sqrt{3}\\)` },
      { value:"-1/√3", html:`\\(-\\frac{1}{\\sqrt{3}}\\)` },
      { value:"-√3", html:`\\(-\\sqrt{3}\\)` },
      { value:"定義されない", html:`定義されない` }
    ];

    let score = 0;
    let current = null;
    let solved = false;
    let mode = "all";
    let pool = [];
    let winTimer = null;

    function allowedQuestions(){
      if (mode === "sincos"){
        return questions.filter(q => q.f === "sin" || q.f === "cos");
      }

      if (mode === "tan"){
        return questions.filter(q => q.f === "tan");
      }

      return questions.slice();
    }

    function refillPool(){
      pool = allowedQuestions().slice();

      for (let i=pool.length-1; i>0; i--){
        const j = Math.floor(Math.random() * (i+1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
    }

    function nextQuestion(){
      if (pool.length === 0) refillPool();

      current = pool.pop();
      solved = false;

      $("question").innerHTML = `\\(${current.tex}\\)`;
      $("nextBtn").disabled = true;

      setJudge(null, "答えを選んでください。");

      document.querySelectorAll(".choiceBtn").forEach(btn => {
        btn.disabled = false;
        btn.classList.remove("ok", "bad");
      });

      if (window.MathJax){
        MathJax.typesetPromise();
      }
    }

    function buildChoices(){
      const area = $("choiceArea");
      area.innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choiceBtn";
        btn.innerHTML = choice.html;
        btn.dataset.value = choice.value;

        btn.addEventListener("click", () => answer(choice.value, btn));

        area.appendChild(btn);
      });

      if (window.MathJax){
        MathJax.typesetPromise();
      }
    }

    function setJudge(state, text){
      const el = $("judge");
      el.classList.remove("ok", "bad");

      if (state === "ok") el.classList.add("ok");
      if (state === "bad") el.classList.add("bad");

      el.textContent = text;
    }

    function answer(value, btn){
      if (solved) return;

      if (value === current.ans){
        solved = true;
        score++;
        $("score").textContent = String(score);

        btn.classList.add("ok");

        document.querySelectorAll(".choiceBtn").forEach(b => {
          b.disabled = true;
          if (b.dataset.value === current.ans){
            b.classList.add("ok");
          }
        });

        setJudge("ok", "正解！");
        $("nextBtn").disabled = false;

        showWinOverlay(score);
      } else {
        btn.classList.add("bad");
        setJudge("bad", "違います。もう一度選んでください。");
      }
    }

    function showWinOverlay(count){
      const o = $("winOverlay");
      const c = $("winCount");
      const inner = $("winInner");

      c.textContent = String(count);

      const big = count % 5 === 0;
      const dur = big ? 2200 : 1100;

      inner.classList.toggle("big", big);

      o.classList.remove("show");
      void o.offsetWidth;
      o.classList.add("show");

      if (winTimer) clearTimeout(winTimer);
      winTimer = setTimeout(() => {
        o.classList.remove("show");
        inner.classList.remove("big");
      }, dur);
    }

    function setMode(newMode){
      mode = newMode;

      $("modeAll").classList.toggle("active", mode === "all");
      $("modeSinCos").classList.toggle("active", mode === "sincos");
      $("modeTan").classList.toggle("active", mode === "tan");

      refillPool();
      nextQuestion();
    }

    function resetScore(){
      score = 0;
      $("score").textContent = "0";
      refillPool();
      nextQuestion();
    }

    function openHint(type){
      const image = $("hintImage");
      const label = $("hintLabel");

      if (type === 1){
        image.src = "hint1-circle.png";
        label.textContent = "ヒント1：空欄つきの図";
      } else {
        image.src = "hint2-circle.png";
        label.textContent = "ヒント2：完成版の図";
      }

      $("hintOverlay").classList.add("show");
      $("hintOverlay").setAttribute("aria-hidden", "false");
    }

    function closeHint(){
      $("hintOverlay").classList.remove("show");
      $("hintOverlay").setAttribute("aria-hidden", "true");
    }

    $("nextBtn").addEventListener("click", nextQuestion);
    $("resetBtn").addEventListener("click", resetScore);

    $("modeAll").addEventListener("click", () => setMode("all"));
    $("modeSinCos").addEventListener("click", () => setMode("sincos"));
    $("modeTan").addEventListener("click", () => setMode("tan"));

    $("hint1Btn").addEventListener("click", () => openHint(1));
    $("hint2Btn").addEventListener("click", () => openHint(2));
    $("hintCloseBtn").addEventListener("click", closeHint);

    $("hintOverlay").addEventListener("click", (e) => {
      if (e.target.id === "hintOverlay"){
        closeHint();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape"){
        closeHint();
      }
    });

    buildChoices();
    refillPool();
    nextQuestion();
  </script>
</body>
</html>
